<body>
<div class="app">
  <div class="top">
    <div class="topMain">
      <div class="brand">西铁照明彩平图工具</div>
      <button class="navBtn active" data-panel="file">文件</button>
      <button class="navBtn" data-panel="light">灯光</button>
      <button class="navBtn" data-panel="mark">标注</button>
      <button class="navBtn" data-panel="view">视图</button>
      <button class="navBtn" data-panel="ai">AI生图</button>

    </div>
    <div class="topSub">
      <div class="panel active" data-panel-content="file">
        <div class="group"><span class="gt">文件</span><label class="btn" for="bgIn">上传图纸</label><input id="bgIn" type="file" accept="image/*"><button id="pngBtn">导出PNG</button><button id="jsonBtn">保存JSON</button><label class="btn" for="jsonIn">导入JSON</label><button id="versionBtn">版本信息</button><input id="jsonIn" type="file" accept="application/json,.json"></div>
      </div>
      <div class="panel" data-panel-content="light">
        <div class="group"><span class="gt">灯光</span><button class="tool active" data-t="select">选择</button><button class="tool" data-t="pan">手形</button><button class="tool" data-t="point">点光源</button><button class="tool" data-t="lineLight">直线灯带</button><button class="tool dev-disabled" data-t="polylineLight" title="连续灯带待开发，当前版本暂不开放选择">连续灯带</button><button class="tool" data-t="rectLight">矩形灯带</button><button class="tool" data-t="ellipseLight">圆/椭圆灯带</button><button class="tool" data-t="polyLight">多边形灯带</button><span class="toolWrap" id="areaLightWrap"><button class="tool" data-area-menu="1" title="选择区域光形状">区域光 ▾</button><span class="toolMenu" id="areaMenu"><button class="tool" data-t="areaLightRect">矩形</button><button class="tool" data-t="areaLightTriangle">三角形</button><button class="tool" data-t="areaLightCircle">圆形</button><button class="tool" data-t="areaLightHex">六边形</button></span></span></div>
      </div>
      <div class="panel" data-panel-content="mark">
        <div class="group"><span class="gt">标注</span><button class="tool" data-t="line">普通线</button><button class="tool" data-t="arrow">箭头</button><button class="tool" data-t="text">文字</button><span class="toolWrap" id="normalAreaWrap"><button class="tool" data-normal-area-menu="1" title="选择普通区域形状">普通区域 ▾</button><span class="toolMenu" id="normalAreaMenu"><button class="tool" data-t="areaRect">矩形</button><button class="tool" data-t="areaTriangle">三角形</button><button class="tool" data-t="areaCircle">圆形</button><button class="tool" data-t="areaHex">六边形</button></span></span></div>
      </div>
      <div class="panel" data-panel-content="view">
        <div class="group"><span class="gt">视图</span><button id="fitBtn">适配</button><button id="zOut">-</button><span id="zoom" class="small">100%</span><button id="zIn">+</button></div>
        <div class="group"><span class="gt">层级</span><div class="layerMiniGroup"><button id="layerTop" title="置顶">置顶</button><button id="layerUp" title="上移一层">上移</button><button id="layerDown" title="下移一层">下移</button><button id="layerBottom" title="置底">置底</button></div></div>
      </div>
      <div class="panel aiPanel" data-panel-content="ai">
        <div class="group"><span class="gt">AI生图</span><select id="aiProvider"><option value="doubao">豆包</option><option value="openai">OpenAI Image</option><option value="qwen">千问</option><option value="deepseek">DeepSeek（提示词）</option><option value="custom">自定义接口</option></select><select id="aiMode"><option value="line_to_plan">线稿转彩平图</option><option value="style_optimize">彩平图风格优化</option><option value="prompt_optimize">提示词优化</option></select><select id="aiTemplate" class="aiTemplateSelect" title="提示词模板"></select><button id="aiApplyTemplate">套用模板</button><button id="aiTemplateManage">模板管理</button><input id="aiKey" class="aiKeyInput" type="password" placeholder="API Key / EXE本地中转预留"><button id="aiSaveKey">保存密钥</button><button id="aiPromptBtn">提示词</button><button id="aiGenerateBtn">生成彩平图</button><span class="versionPill">预留接口，EXE版本地中转</span></div>
      </div>

  <aside class="side">

    <div class="sec"><h3>底图</h3><div class="form"><label>暗化</label><div class="rng"><input id="dark" type="range" min="0" max="90" value="55"><span id="darkV">55%</span></div></div><div class="form"><label>透明</label><div class="rng"><input id="bgop" type="range" min="10" max="100" value="100"><span id="bgopV">100%</span></div></div></div>
    <div class="sec"><h3>对象 / 图层</h3>
      <div class="groupTools"><button id="groupNew">新建组</button><button id="groupAdd">加入组</button><button id="groupRemove">移出组</button></div>
      <div id="objList" class="list"></div>
      <div class="lockNote">提示：被遮挡对象可从图层列表中选中；组支持显示 / 隐藏、锁定 / 解锁、改名。</div>
    </div>
  </aside>
  <main class="canvasBox"><canvas id="c"></canvas><div id="status" class="status">未上传图纸</div><div id="ctx" class="ctx"></div><div id="toast" class="toast"></div><div id="polybar" class="polybar">绘制中：双击或右键完成</div></main>
  <aside class="side right">
    <div class="title">属性</div>
    <div class="sec"><h3>发光预设</h3><div class="form"><label>当前预设</label><select id="preset"></select></div><div class="form"><label>使用上次</label><input id="useLast" type="checkbox" checked></div><div class="presetBtns"><button id="savePreset">保存为预设</button><button id="updatePreset">更新预设</button><button id="resetDefault">恢复默认</button></div><div class="hint" style="margin-top:8px">普通线、箭头、文字、普通区域不使用灯光参数。选中对象后可拖动控制点调整大小；支持 Ctrl+C / Ctrl+V 复制粘贴。</div></div>
    <div class="sec"><h3 id="propTitle">未选中对象</h3><div id="props" class="small">选择对象后显示属性。</div></div>
  </aside>
</div>
<script>
(()=>{
const cvs=document.getElementById('c'), ctx=cvs.getContext('2d'), box=cvs.parentElement, menu=document.getElementById('ctx'), toast=document.getElementById('toast');
let dpr=1,W=1,H=1,bg={img:null,url:null,w:1600,h:1000},view={x:0,y:0,s:1},tool='select',objs=[],groups=[],sel=new Set(),id=1,gidn=1,drag=null,draw=null,preview=null,poly=[],hoverTarget=null,hoverHandle=null,clipboard=null,pasteCount=0;
const defaultP={
 point:{type:'point',beam:24,temp:3000,brightness:125,center:45,glow:230,soft:145,opacity:.96},
 lineLight:{type:'linear',shape:'line',emission:'both',temp:3000,brightness:115,width:8,glow:165,soft:145,opacity:.92,showCore:true},
 polylineLight:{type:'linear',shape:'polyline',emission:'both',temp:3000,brightness:115,width:8,glow:165,soft:145,opacity:.92,showCore:true},
 rectLight:{type:'linear',shape:'rect',emission:'outside',temp:3000,brightness:115,width:8,glow:165,soft:145,opacity:.92,showCore:true},
 ellipseLight:{type:'linear',shape:'ellipse',emission:'outside',temp:3000,brightness:115,width:8,glow:165,soft:145,opacity:.92,showCore:true},
 polyLight:{type:'linear',shape:'polygon',emission:'outside',temp:3000,brightness:115,width:8,glow:165,soft:145,opacity:.92,showCore:true},
 areaLight:{type:'areaLight',shape:'rect',fillMode:'uniform',temp:3000,brightness:115,opacity:.92,soft:145,dir:0},
 line:{type:'draw',color:'#60a5fa',lineWidth:3,lineStyle:'solid',opacity:1,arrow:'none'},
 arrow:{type:'draw',color:'#60a5fa',lineWidth:3,lineStyle:'solid',opacity:1,arrow:'end'},
 text:{type:'text',text:'文字',color:'#ffffff',fontSize:24,bold:false,opacity:1},
 area:{type:'normalArea',shape:'rect',areaShape:'rect',fill:'#38bdf8',stroke:'#38bdf8',fillEnabled:true,strokeEnabled:true,lineWidth:2,lineStyle:'solid',opacity:.22,soft:0}
};
let last=JSON.parse(localStorage.lpLastV5||'null')||JSON.parse(JSON.stringify(defaultP)),presets=loadPresets(),useLast=true;
function gid(){return'g'+gidn++}
function normalizeGroups(){
  groups=(groups||[]).map((g,i)=>({id:g.id||gid(),name:g.name||('对象组 '+(i+1)),visible:g.visible!==false,locked:!!g.locked,collapsed:!!g.collapsed,objectIds:Array.isArray(g.objectIds)?g.objectIds:[]}));
  objs.forEach(o=>{
    if(o.rotation==null)o.rotation=0;
    if(o.groupId&&!groups.some(g=>g.id===o.groupId))o.groupId=null;
    if(o.type==='normalArea'){
      if(!o.areaShape)o.areaShape=(o.shape==='ellipse'?'circle':o.shape==='polygon'?'polygon':'rect');
      if(o.fillEnabled==null)o.fillEnabled=true;
      if(o.strokeEnabled==null)o.strokeEnabled=true;
      if(o.soft==null)o.soft=0;
    }
  });
  groups.forEach(g=>{g.objectIds=[...new Set(objs.filter(o=>o.groupId===g.id).map(o=>o.id).concat(g.objectIds.filter(id=>objs.some(o=>o.id===id))))]});
}
function groupOf(o){return o&&o.groupId?groups.find(g=>g.id===o.groupId):null}
function isHidden(o){let g=groupOf(o);return !!(o&&((g&&g.visible===false)||o.hidden))}
function isLocked(o){let g=groupOf(o);return !!(o&&((g&&g.locked)||o.locked))}
function isRotatable(o){return !!o && o.type!=='point' && !(o.type==='linear'&&o.shape==='line') && o.type!=='draw'}
function rotateAround(p,c,a){let x=p.x-c.x,y=p.y-c.y,co=Math.cos(a),si=Math.sin(a);return{x:c.x+x*co-y*si,y:c.y+x*si+y*co}}
function drawWithRotation(o,fn){let a=(+o.rotation||0)*Math.PI/180;if(!a||!isRotatable(o)){fn();return}let b=bb(o);ctx.save();ctx.translate(b.cx,b.cy);ctx.rotate(a);ctx.translate(-b.cx,-b.cy);fn();ctx.restore()}
function selectedVisible(){return selectedObjects().filter(o=>!isHidden(o))}
function removeFromGroups(ids){groups.forEach(g=>g.objectIds=g.objectIds.filter(id=>!ids.has(id)));objs.forEach(o=>{if(ids.has(o.id))o.groupId=null})}
function deleteSelected(){if(!sel.size)return;let ids=new Set([...sel]);objs=objs.filter(o=>!ids.has(o.id));removeFromGroups(ids);sel.clear();props();render()}

function applyShortcut(sc){
  if(!sc)return false;
  if(sc.tool){setTopPanel(sc.panel||'light');setTool(sc.tool);return true}
  switch(sc.action){
    case 'copy': return copySelected();
    case 'paste': return pasteClipboard();
    case 'delete': if(sel.size){deleteSelected();return true}return false;
    case 'fit': fit();return true;
    case 'zoomIn': zoomAt({x:W/2,y:H/2},1.15);return true;
    case 'zoomOut': zoomAt({x:W/2,y:H/2},1/1.15);return true;
    case 'exportPng': document.getElementById('pngBtn')?.click();return true;
    case 'saveJson': document.getElementById('jsonBtn')?.click();return true;
    case 'importJson': document.getElementById('jsonIn')?.click();return true;
    case 'uploadBg': document.getElementById('bgIn')?.click();return true;
    case 'version': showVersionInfo();return true;
    case 'aiPrompt': setTopPanel('ai');showAiPrompt();return true;
  }
  return false;
}
function handleShortcutKey(e){
  if(e.target&&e.target.matches('input,textarea,select'))return;
  const modal=document.getElementById('xitieModalMask');
  if(modal&&modal.style.display==='flex'&&e.key!=='Escape')return;
  if(e.key==='Escape'&&modal&&modal.style.display==='flex'){modal.style.display='none';e.preventDefault();return}
  const combo=comboFromEvent(e),sc=shortcutByCombo(combo);
  if(sc){let ok=applyShortcut(sc);e.preventDefault();return}
}

function captureShortcut(id){
  const input=[...document.querySelectorAll('[data-key-for]')].find(el=>el.dataset.keyFor===id);if(!input)return;
  input.value='请按新快捷键...';input.classList.remove('shortcutConflict');
  const listener=(e)=>{
    e.preventDefault();e.stopPropagation();
    if(e.key==='Escape'){document.removeEventListener('keydown',listener,true);showShortcutSettings();return}
    const combo=comboFromEvent(e);
    if(!combo){return}
    const used=loadShortcuts().find(s=>s.id!==id&&s.keys===combo);
    if(used){input.value=`冲突：${used.name}`;input.classList.add('shortcutConflict');toastMsg('快捷键冲突，请换一个组合键');return}
    saveShortcut(id,combo);document.removeEventListener('keydown',listener,true);showShortcutSettings();toastMsg('快捷键已更新：'+combo);
  };
  document.addEventListener('keydown',listener,true);
}

function loadAiTemplates(){let custom=[];try{custom=JSON.parse(localStorage.xitieAiTemplatesV1||'[]')}catch(e){};return defaultAiTemplates.concat(custom)}
function saveAiTemplates(custom){localStorage.xitieAiTemplatesV1=JSON.stringify(custom)}
function findAiTemplate(id){return loadAiTemplates().find(t=>t.id===id)||loadAiTemplates()[0]}
function renderAiTemplateSelect(id='aiTemplate'){
  const el=document.getElementById(id);if(!el)return;
  const cur=el.value;
  el.innerHTML=loadAiTemplates().map(t=>`<option value="${escAttr(t.id)}">${t.sys?'系统｜':'自定义｜'}${esc(t.name)}</option>`).join('');
  if(cur&&[...el.options].some(o=>o.value===cur))el.value=cur;
}
function applyAiTemplate(id){
  const t=findAiTemplate(id||document.getElementById('aiTemplate')?.value);if(!t)return;
  let c={};try{c=JSON.parse(localStorage.xitieAiConfig||'{}')}catch(e){}
  c.template=t.id;c.prompt=t.prompt;c.negative=t.negative||'';if(t.mode)c.mode=t.mode;
  localStorage.xitieAiPrompt=c.prompt;localStorage.xitieAiNegative=c.negative;localStorage.xitieAiConfig=JSON.stringify(c);
  if(document.getElementById('aiTemplate'))document.getElementById('aiTemplate').value=t.id;
  if(document.getElementById('aiMode')&&t.mode)document.getElementById('aiMode').value=t.mode;
  toastMsg('已套用提示词模板：'+t.name);
}
function savePromptFields(){
  let c={};try{c=JSON.parse(localStorage.xitieAiConfig||'{}')}catch(e){}
  c.prompt=document.getElementById('aiPromptText')?.value||'';c.negative=document.getElementById('aiNegativeText')?.value||'';c.template=document.getElementById('aiTemplate')?.value||c.template||'';
  localStorage.xitieAiPrompt=c.prompt;localStorage.xitieAiNegative=c.negative;localStorage.xitieAiConfig=JSON.stringify(c);
}
function saveCurrentPromptAsTemplate(){
  const name=prompt('自定义模板名称','我的彩平图模板');if(!name)return;
  const promptText=document.getElementById('aiPromptText')?.value||localStorage.xitieAiPrompt||defaultAiTemplates[0].prompt;
  const negative=document.getElementById('aiNegativeText')?.value||localStorage.xitieAiNegative||defaultAiTemplates[0].negative;
  let custom=loadAiTemplates().filter(t=>!t.sys);
  const t={id:'tpl_'+Date.now(),sys:false,name,mode:document.getElementById('aiMode')?.value||'line_to_plan',prompt:promptText,negative};
  custom.push(t);saveAiTemplates(custom);renderAiTemplateSelect();renderAiTemplateSelect('aiPromptTemplate');document.getElementById('aiTemplate').value=t.id;toastMsg('已保存自定义提示词模板');
}
function showAiTemplateManager(){
  const opts=loadAiTemplates().map(t=>`<option value="${escAttr(t.id)}">${t.sys?'系统｜':'自定义｜'}${esc(t.name)}</option>`).join('');
  const first=findAiTemplate(document.getElementById('aiTemplate')?.value);
  xitieModal('AI 提示词模板管理',`<div class="templateEditor"><label>选择模板</label><select id="tplSelect">${opts}</select><label>模板名称</label><input id="tplName" class="shortName" value="${escAttr(first.name)}"><label>正向提示词</label><textarea id="tplPrompt">${esc(first.prompt)}</textarea><label>负面提示词</label><textarea id="tplNegative">${esc(first.negative||'')}</textarea></div><div class="small"><span class="templateBadge">系统模板</span> 可以套用或另存为自定义；自定义模板可以更新和删除。</div><div class="xitieActions"><button id="tplApply">套用</button><button id="tplSaveNew">保存为自定义模板</button><button id="tplUpdate">更新自定义</button><button id="tplDelete" class="danger">删除自定义</button></div>`);
  setTimeout(()=>{
    const fill=()=>{let t=findAiTemplate(document.getElementById('tplSelect').value);document.getElementById('tplName').value=t.name;document.getElementById('tplPrompt').value=t.prompt;document.getElementById('tplNegative').value=t.negative||''};
    document.getElementById('tplSelect').value=first.id;document.getElementById('tplSelect').onchange=fill;
    document.getElementById('tplApply').onclick=()=>{applyAiTemplate(document.getElementById('tplSelect').value);document.getElementById('xitieModalMask').style.display='none'};
    document.getElementById('tplSaveNew').onclick=()=>{let custom=loadAiTemplates().filter(t=>!t.sys);let t={id:'tpl_'+Date.now(),sys:false,name:document.getElementById('tplName').value||'自定义模板',mode:document.getElementById('aiMode')?.value||'line_to_plan',prompt:document.getElementById('tplPrompt').value,negative:document.getElementById('tplNegative').value};custom.push(t);saveAiTemplates(custom);renderAiTemplateSelect();document.getElementById('aiTemplate').value=t.id;showAiTemplateManager();toastMsg('模板已保存')};
    document.getElementById('tplUpdate').onclick=()=>{let id=document.getElementById('tplSelect').value,base=findAiTemplate(id);if(base.sys)return toastMsg('系统模板不能直接更新，请保存为自定义模板');let custom=loadAiTemplates().filter(t=>!t.sys);let t=custom.find(x=>x.id===id);if(t){t.name=document.getElementById('tplName').value||t.name;t.prompt=document.getElementById('tplPrompt').value;t.negative=document.getElementById('tplNegative').value;saveAiTemplates(custom);renderAiTemplateSelect();showAiTemplateManager();toastMsg('自定义模板已更新')}};
    document.getElementById('tplDelete').onclick=()=>{let id=document.getElementById('tplSelect').value,base=findAiTemplate(id);if(base.sys)return toastMsg('系统模板不能删除');let custom=loadAiTemplates().filter(t=>!t.sys&&t.id!==id);saveAiTemplates(custom);renderAiTemplateSelect();showAiTemplateManager();toastMsg('自定义模板已删除')};
  });
}

function showVersionInfo(){
  xitieModal('版本信息 / 更新说明',`<h3>西铁照明彩平图工具</h3><div class="small">当前版本：AI多风格提示词模板版</div><h3>本次更新</h3><ul><li>新增 AI 生图工作区，支持配置 AI 平台、生成模式、API Key 和提示词。</li><li>新增线稿转彩平图多风格提示词模板，包含现代简约、轻奢暖灰、奶油原木、黑白灰高级、现代科技智能、侘寂微水泥、现代东方、商业展示、高端样板间等风格。</li><li>支持自定义 AI 提示词模板，可保存、套用、更新和删除。</li><li>常用绘图工具和常用操作支持快捷键，并可自定义快捷键。</li><li>支持对象图层管理、对象组管理、显示隐藏、锁定解锁和层级调整。</li><li>支持对象选择、框选、多选、复制粘贴、删除、旋转和缩放编辑。</li><li>支持普通区域多形状绘制，包括矩形、三角形、圆形和六边形。</li></ul><h3>说明</h3><ul><li>AI 生图当前为接口预留版本，后续 EXE 版将通过本地服务调用模型。</li><li>连续灯带功能仍在优化中，当前版本暂不开放。</li></ul>`)
}
function loadAiConfig(){
  let c={};try{c=JSON.parse(localStorage.xitieAiConfig||'{}')}catch(e){}
  let p=document.getElementById('aiProvider'),m=document.getElementById('aiMode'),k=document.getElementById('aiKey'),t=document.getElementById('aiTemplate');
  if(p&&c.provider)p.value=c.provider;if(m&&c.mode)m.value=c.mode;if(k&&c.key)k.value=c.key;if(t&&c.template)t.value=c.template;
}
function saveAiConfig(){
  const c={provider:document.getElementById('aiProvider')?.value||'doubao',mode:document.getElementById('aiMode')?.value||'line_to_plan',template:document.getElementById('aiTemplate')?.value||'',key:document.getElementById('aiKey')?.value||'',prompt:localStorage.xitieAiPrompt||'',negative:localStorage.xitieAiNegative||''};
  localStorage.xitieAiConfig=JSON.stringify(c);toastMsg('AI配置已保存到本机浏览器，EXE版可改为本机加密保存');
}
function showAiPrompt(){
  let cfg={};try{cfg=JSON.parse(localStorage.xitieAiConfig||'{}')}catch(e){}
  const prompt=cfg.prompt||localStorage.xitieAiPrompt||defaultAiTemplates[0].prompt;
  const neg=cfg.negative||localStorage.xitieAiNegative||defaultAiTemplates[0].negative;
  xitieModal('AI 生图提示词',`<div class="xitieGrid"><label>提示词模板</label><div class="row"><select id="aiPromptTemplate" style="flex:1"></select><button id="aiPromptApply">套用模板</button><button id="aiPromptSaveTpl">保存为模板</button></div><label>正向提示词</label><textarea id="aiPromptText">${esc(prompt)}</textarea><label>负面提示词</label><textarea id="aiNegativeText">${esc(neg)}</textarea></div><div class="small">提示：当前 HTML 版本会把提示词和模板保存到本机浏览器。后续 EXE 版可由本地中转服务把线稿图片、提示词、API Key 一起发送给 AI 平台。</div><div class="xitieActions"><button id="aiPromptSave">保存提示词</button></div>`);
  setTimeout(()=>{
    renderAiTemplateSelect('aiPromptTemplate');
    let apply=document.getElementById('aiPromptApply');if(apply)apply.onclick=()=>{let t=findAiTemplate(document.getElementById('aiPromptTemplate').value);if(t){document.getElementById('aiPromptText').value=t.prompt;document.getElementById('aiNegativeText').value=t.negative||''}};
    let saveTpl=document.getElementById('aiPromptSaveTpl');if(saveTpl)saveTpl.onclick=()=>saveCurrentPromptAsTemplate();
    let b=document.getElementById('aiPromptSave');if(b)b.onclick=()=>{savePromptFields();document.getElementById('xitieModalMask').style.display='none';toastMsg('提示词已保存')};
  });
}
function aiGenerateReserved(){
  saveAiConfig();
  xitieModal('AI 生图接口预留',`<h3>当前状态</h3><div>AI 生图界面已经预留，但当前纯 HTML 版本不会直接调用外部 AI 接口。</div><h3>正式接入方式</h3><ul><li>打包 EXE 后，由 EXE 主进程 / 本地后端作为中转。</li><li>API Key 由本地后端加密保存，不暴露在前端页面。</li><li>本地中转负责上传线稿、发送提示词、接收图片结果。</li><li>返回结果后可扩展为：预览、应用为底图、作为新图层插入。</li></ul><div class="small">这样可以避免浏览器 CORS 跨域问题，也避免密钥直接暴露在网页 JS 中。</div>`)
}
